<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ShopEasy{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #ff6b35;
  --primary-light: #fff0eb;
  --primary-dark: #e85520;
  --secondary: #4361ee;
  --secondary-light: #eef0fd;
  --accent: #f72585;
  --success: #06d6a0;
  --warning: #ffd166;
  --bg: #fafaf8;
  --surface: #ffffff;
  --border: #e8e8e4;
  --text: #1a1a2e;
  --muted: #9292a0;
  --display: 'Nunito', sans-serif;
  --body: 'Poppins', sans-serif;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(26,26,46,0.08);
  --shadow-lg: 0 12px 48px rgba(26,26,46,0.14);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--body); line-height:1.6; min-height:100vh; display:flex; flex-direction:column; }
a { color:inherit; text-decoration:none; }
button { cursor:pointer; font-family:var(--body); }
img { max-width:100%; }

/* ── NAV ── */
nav {
  background:var(--surface); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:200;
  box-shadow: 0 2px 12px rgba(26,26,46,0.05);
}
.nav-inner {
  max-width:1200px; margin:0 auto; padding:0 1.5rem;
  display:flex; align-items:center; gap:1.5rem; height:64px;
}
.nav-brand {
  font-family:var(--display); font-weight:900; font-size:1.4rem;
  color:var(--primary); letter-spacing:-0.02em; white-space:nowrap;
}
.nav-brand span { color:var(--secondary); }
.nav-search {
  flex:1; max-width:400px;
  display:flex; align-items:center; gap:8px;
  background:var(--bg); border:1.5px solid var(--border);
  border-radius:100px; padding:0 1rem; height:40px;
  transition:border-color 0.2s;
}
.nav-search:focus-within { border-color:var(--primary); }
.nav-search input { border:none; background:none; outline:none; font-family:var(--body); font-size:0.875rem; width:100%; color:var(--text); }
.nav-search input::placeholder { color:var(--muted); }
.nav-links { display:flex; align-items:center; gap:0.25rem; margin-left:auto; }
.nav-link {
  display:flex; flex-direction:column; align-items:center;
  padding:0.4rem 0.75rem; border-radius:var(--radius-sm);
  font-size:0.7rem; color:var(--muted); font-weight:600;
  transition:all 0.15s; text-decoration:none; gap:2px;
}
.nav-link svg { width:20px; height:20px; }
.nav-link:hover { color:var(--primary); background:var(--primary-light); }
.nav-link.active { color:var(--primary); }
.cart-badge {
  position:relative; display:inline-block;
}
.badge-count {
  position:absolute; top:-6px; right:-6px;
  background:var(--accent); color:white;
  font-size:0.6rem; font-weight:800; min-width:16px; height:16px;
  border-radius:100px; display:flex; align-items:center; justify-content:center;
  padding:0 4px; border:2px solid white;
}
.btn-nav-login {
  background:var(--primary); color:white;
  border:none; border-radius:100px;
  padding:0.5rem 1.25rem; font-weight:700; font-size:0.85rem;
  transition:all 0.15s;
}
.btn-nav-login:hover { background:var(--primary-dark); transform:translateY(-1px); }

/* ── LAYOUT ── */
main { flex:1; max-width:1200px; margin:0 auto; padding:2rem 1.5rem; width:100%; }

/* ── BUTTONS ── */
.btn { display:inline-flex; align-items:center; gap:8px; border:none; border-radius:100px; padding:0.65rem 1.5rem; font-weight:700; font-size:0.9rem; transition:all 0.15s; font-family:var(--body); }
.btn-primary { background:var(--primary); color:white; }
.btn-primary:hover { background:var(--primary-dark); transform:translateY(-1px); box-shadow:0 6px 20px rgba(255,107,53,0.35); }
.btn-secondary { background:var(--secondary); color:white; }
.btn-secondary:hover { background:#2f4bd0; transform:translateY(-1px); }
.btn-outline { background:transparent; color:var(--primary); border:2px solid var(--primary); }
.btn-outline:hover { background:var(--primary-light); }
.btn-ghost { background:var(--bg); color:var(--text); border:1.5px solid var(--border); }
.btn-ghost:hover { border-color:var(--primary); color:var(--primary); }
.btn-sm { padding:0.4rem 1rem; font-size:0.8rem; }
.btn-lg { padding:0.85rem 2rem; font-size:1rem; }
.btn-block { width:100%; justify-content:center; border-radius:var(--radius-sm); }

/* ── CARDS ── */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
.card-body { padding:1.5rem; }

/* ── FORMS ── */
.form-group { margin-bottom:1.25rem; }
label { display:block; font-size:0.82rem; font-weight:600; color:var(--text); margin-bottom:0.4rem; }
input[type=text], input[type=email], input[type=password], input[type=number], textarea, select {
  width:100%; border:1.5px solid var(--border); border-radius:var(--radius-sm);
  padding:0.65rem 1rem; font-family:var(--body); font-size:0.9rem; color:var(--text);
  background:var(--surface); transition:border-color 0.2s; outline:none;
}
input:focus, textarea:focus, select:focus { border-color:var(--primary); }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:1.5rem; right:1.5rem; z-index:999;
  background:var(--text); color:white; border-radius:var(--radius-sm);
  padding:0.85rem 1.25rem; font-size:0.875rem; font-weight:600;
  box-shadow:var(--shadow-lg); opacity:0; transform:translateY(12px);
  transition:all 0.25s; pointer-events:none; max-width:300px;
}
#toast.show { opacity:1; transform:translateY(0); }
#toast.success { background:var(--success); }
#toast.error { background:var(--accent); }

/* ── TAGS/BADGES ── */
.tag { display:inline-block; font-size:0.72rem; font-weight:700; padding:0.2rem 0.65rem; border-radius:100px; }
.tag-primary { background:var(--primary-light); color:var(--primary); }
.tag-success { background:#e8faf5; color:#0a9e75; }
.tag-warning { background:#fff8e6; color:#b87d00; }
.tag-info { background:var(--secondary-light); color:var(--secondary); }
.tag-danger { background:#ffeef2; color:#c0144a; }

/* ── STAR RATING ── */
.stars { color:var(--warning); font-size:0.9rem; letter-spacing:1px; }

/* ── PAGE HEADER ── */
.page-header { margin-bottom:2rem; }
.page-header h1 { font-family:var(--display); font-size:1.8rem; font-weight:800; }
.page-header p { color:var(--muted); margin-top:0.25rem; }

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:4rem 2rem; }
.empty-state .emoji { font-size:3.5rem; margin-bottom:1rem; }
.empty-state h3 { font-family:var(--display); font-weight:800; margin-bottom:0.5rem; }
.empty-state p { color:var(--muted); margin-bottom:1.5rem; }

/* ── SPINNER ── */
.spinner { display:inline-block; width:20px; height:20px; border:2.5px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── FOOTER ── */
footer {
  background:var(--text); color:rgba(255,255,255,0.7);
  padding:2rem 1.5rem; margin-top:auto;
}
.footer-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
.footer-brand { font-family:var(--display); font-weight:900; font-size:1.1rem; color:white; }
.footer-brand span { color:var(--primary); }
.footer-note { font-size:0.8rem; }
.footer-links { display:flex; gap:1.5rem; }
.footer-links a { font-size:0.82rem; transition:color 0.15s; }
.footer-links a:hover { color:white; }

/* ── UTILITY ── */
.flex { display:flex; }
.gap-1 { gap:0.5rem; }
.gap-2 { gap:1rem; }
.gap-3 { gap:1.5rem; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.flex-wrap { flex-wrap:wrap; }
.grid { display:grid; }
.mt-1 { margin-top:0.5rem; }
.mt-2 { margin-top:1rem; }
.mt-3 { margin-top:1.5rem; }
.mb-2 { margin-bottom:1rem; }
.text-muted { color:var(--muted); }
.text-sm { font-size:0.85rem; }
.font-bold { font-weight:700; }
.text-primary { color:var(--primary); }
.text-success { color:var(--success); }
.text-center { text-align:center; }
.w-full { width:100%; }
.divider { border:none; border-top:1px solid var(--border); margin:1.5rem 0; }

{% block extra_style %}{% endblock %}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">Shop<span>Easy</span></a>
    <div class="nav-search">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:var(--muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search products…" id="search-input" autocomplete="off">
    </div>
    <div class="nav-links">
      <a href="/shop" class="nav-link {% block nav_shop %}{% endblock %}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Shop
      </a>
      <a href="/orders" class="nav-link {% block nav_orders %}{% endblock %}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Orders
      </a>
      <a href="/messages" class="nav-link {% block nav_msgs %}{% endblock %}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Inbox
      </a>
      <a href="/cart" class="nav-link cart-badge {% block nav_cart %}{% endblock %}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        Cart
        <span class="badge-count" id="cart-count" style="display:none">0</span>
      </a>
      <div id="nav-auth">
        <a href="/login" class="btn btn-nav-login">Sign in</a>
      </div>
    </div>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer>
  <div class="footer-inner">
    <span class="footer-brand">Shop<span>Easy</span></span>
    <div class="footer-links">
      <a href="/shop">Shop</a>
      <a href="#">Help</a>
      <a href="#">Returns</a>
    </div>
    <span class="footer-note">© 2024 ShopEasy Inc. All rights reserved.</span>
  </div>
</footer>

<div id="toast"></div>

<script>
// ── GLOBAL HELPERS ─────────────────────────────────
const API = {
  get: (url) => fetch(url, {headers: authHeaders()}).then(r => r.json()),
  post: (url, body) => fetch(url, {method:'POST', headers:{'Content-Type':'application/json',...authHeaders()}, body:JSON.stringify(body)}).then(r => r.json()),
};

function authHeaders() {
  const t = localStorage.getItem('se_token');
  return t ? {Authorization: 'Bearer ' + t} : {};
}

function getUser() {
  try { return JSON.parse(localStorage.getItem('se_user') || 'null'); } catch { return null; }
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  setTimeout(() => el.className = '', 2800);
}

function getCart() {
  try { return JSON.parse(localStorage.getItem('se_cart') || '[]'); } catch { return []; }
}

function updateCartBadge() {
  const cart = getCart();
  const count = cart.reduce((s,i)=>s+i.qty,0);
  const el = document.getElementById('cart-count');
  if (count > 0) { el.style.display='flex'; el.textContent=count; }
  else el.style.display='none';
}

// ── NAV AUTH STATE ──────────────────────────────────
function updateNav() {
  const user = getUser();
  const navAuth = document.getElementById('nav-auth');
  if (user) {
    navAuth.innerHTML = `
      <a href="/profile" class="nav-link">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${user.username}
      </a>`;
  }
  updateCartBadge();
}

// ── SEARCH ──────────────────────────────────────────
const si = document.getElementById('search-input');
if (si) {
  si.addEventListener('keydown', e => {
    if (e.key === 'Enter' && si.value.trim()) {
      window.location.href = '/shop?q=' + encodeURIComponent(si.value.trim());
    }
  });
}

updateNav();
</script>
{% block extra_script %}{% endblock %}
</body>
</html>
